name: 'build and deploy production'

on:
  push:
    tags:
      - 'v*' # Trigger เมื่อ push tag ที่ขึ้นต้นด้วย v (เช่น v1.0.0)

jobs:
  release-docker-image-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase registry and image names
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> ${GITHUB_ENV}
          echo "OWNER_NAME=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Build image and push to GitHub Packages (Docker Registry)
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ env.REPO_NAME }}
          registry: ghcr.io/${{ env.OWNER_NAME }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  auto-deploy-docker-job:
    needs: release-docker-image-job
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase registry and image names for deployment
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: executing remote ssh commands using password
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: '159.223.41.181' #production url: 159.223.41.181:9003
          username: 'root'
          password: '$Admin_1jj395qu'
          port: '22'
          script: |
            docker logout ghcr.io
            docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
            docker rm -f phitharawat-vue-app || true
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker run --restart=always -d --name phitharawat-vue-app -p 9003:80 ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
